<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buku Tamu Digital - Sekretariat DPRD Kab. Padang Pariaman</title>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; padding: 40px 15px; }
    .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    .btn-primary { background-color: #0d6efd; border: none; padding: 12px; border-radius: 8px; font-weight: 600; }
    .header-logo img { max-height: 80px; margin-bottom: 15px; }
    .form-label { font-weight: 600; color: #495057; }
    .preview-img { width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; display: none; margin-top: 10px; border: 2px solid #dee2e6; }
    
    /* Loading Spinner Overlay */
    #loader { 
      display: none; 
      position: fixed; 
      top: 0; left: 0; 
      width: 100%; height: 100%; 
      background: rgba(255,255,255,0.85); 
      z-index: 1000; 
      justify-content: center; 
      align-items: center; 
      flex-direction: column; 
    }
    
    .character-img {
      width: 100%;
      max-width: 200px;
      height: auto;          
      max-height: 220px;
      object-fit: cover;
      border-radius: 12px;
      filter: drop-shadow(0px 8px 15px rgba(0,0,0,0.3));
      border: 3px solid #ffffff;
    }

    .asn-container {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
      width: 70%;           
      text-align: center;
      animation: floating 3s ease-in-out infinite;
    }

    .speech-bubble {
      position: relative;
      background: #0d6efd;
      color: #ffffff;
      border-radius: .4em;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      display: inline-block;
    }
    .speech-bubble:after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 0;
      border: 10px solid transparent;
      border-top-color: #0d6efd;
      border-bottom: 0;
      margin-left: -10px;
      margin-bottom: -10px;
    }

    @keyframes floating {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    .preview-doc-box {
      display: none;
      margin-top: 10px;
      padding: 10px;
      background: #e9ecef;
      border-radius: 8px;
      font-size: 12px;
      color: #495057;
      align-items: center;
      border: 1px dashed #ced4da;
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner-border text-primary" role="status"></div>
    <span class="mt-2 fw-bold text-primary">Mengirim Data ke Sekretariat...</span>
    <span class="text-muted small">Mohon tunggu sampai proses upload selesai...</span>
  </div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4">
          <div class="text-center header-logo">
            <img src="https://drive.google.com/thumbnail?id=1xTRLN1z2GsEFpzlwrIGbGp1UoQ7eS_MD&sz=w500" alt="Logo">
            <br>
            <div class="asn-container">
              <div class="speech-bubble">Tarimo Kasih Alah Datang!</div>
              <img src="https://drive.google.com/thumbnail?id=1YY_fvTEmlGMM-YKHx_Kwlb8J6Trn-pgN&sz=w800" alt="asn minang" class="character-img">
            </div>
            <h4 class="fw-bold mt-2">Buku Tamu Digital</h4>
            <p class="text-muted">Sekretariat DPRD Kab. Padang Pariaman</p>
          </div>

          <form id="guestForm">
            <div class="mb-3">
              <label class="form-label">Tanggal Kedatangan</label>
              <input type="date" name="tanggal" id="tanggalInput" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Nama Lengkap</label>
              <input type="text" name="nama" class="form-control form-control-lg" placeholder="Masukkan nama Lengkap" required autocomplete="off">
            </div>
            <div class="mb-3">
              <label class="form-label">Instansi</label>
              <input type="text" name="instansi" class="form-control" placeholder="Contoh: DPRD Prov. Sumbar" required autocomplete="off">
            </div>
            <div class="mb-3">
              <label class="form-label">Tujuan Kunjungan</label>
              <textarea name="keperluan" class="form-control" rows="2" placeholder="Tuliskan alasan kunjungan..." required></textarea>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label small">Foto Diri</label>
                <input type="file" id="fotoInput" class="form-control form-control-sm" accept="image/*" required onchange="customPreviewFile('fotoInput', 'previewFoto', 'previewDocFoto')">
                <img id="previewFoto" class="preview-img">
                <div id="previewDocFoto" class="preview-doc-box"></div>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label small">Lampiran SPT</label>
                <input type="file" id="sptInput" class="form-control form-control-sm" accept=".pdf,image/*" required onchange="customPreviewFile('sptInput', 'previewSPT', 'previewDocSPT')">
                <img id="previewSPT" class="preview-img">
                <div id="previewDocSPT" class="preview-doc-box"></div>
              </div>
            </div>

            <button type="submit" id="btnSubmit" class="btn btn-primary w-100 mt-3 d-flex align-items-center justify-content-center">
              <span class="material-icons me-2">send</span> Kirim Kehadiran
            </button>
          </form>
         
          <div id="output" class="mt-3"></div>
        </div>
        <p class="text-center text-muted mt-4 small">&copy; Handra Praditia Putra | 2026 IT Secretariat DPRD Padang Pariaman</p>
      </div>
    </div>
  </div>

  <script>
    // Link API Web App Resmi Milik Bapak
    const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbziQ8Be0HV4qxMXWE9o0KDYOTkW2_4mNdEUUMPj4YKroqTBUdZT9D5ErDxdx6O7ZsFRtg/exec";

    // Pasang Tanggal Hari Ini secara otomatis
    window.onload = function() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('tanggalInput').value = today;
    };

    // Fungsi Preview Fleksibel (Mendukung Gambar & PDF)
    function customPreviewFile(inputId, previewImgId, previewBoxId) {
      const fileInput = document.getElementById(inputId);
      const file = fileInput.files[0];
      const previewImg = document.getElementById(previewImgId);
      const previewBox = document.getElementById(previewBoxId);
      
      previewImg.style.display = 'none';
      previewBox.style.display = 'none';

      if (!file) return;

      // Proteksi Ukuran File Maksimal 3 MB
      if (file.size > 3 * 1024 * 1024) {
        alert(`Berkas "${file.name}" terlalu besar! Maksimal ukuran file adalah 3 MB.`);
        fileInput.value = "";
        return;
      }

      if (file.type.includes('image')) {
        const reader = new FileReader();
        reader.onloadend = function () {
          previewImg.src = reader.result;
          previewImg.style.display = 'block';
        }
        reader.readAsDataURL(file);
      } else if (file.type === 'application/pdf') {
        previewBox.innerHTML = `<span class="material-icons text-danger me-2" style="font-size:18px;">picture_as_pdf</span> <span class="text-truncate" style="max-width:130px; display:inline-block;">${file.name}</span>`;
        previewBox.style.display = 'flex';
      }
    }

    // Mengonversi Berkas ke Base64 String secara Aman
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        if (!file) { resolve(null); return; }
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve({
          base64: reader.result.split(',')[1],
          type: file.type,
          name: file.name
        });
        reader.onerror = error => reject(error);
      });
    }

    // Logika Pengiriman Data Formulir via Fetch API
    document.getElementById('guestForm').onsubmit = async function(e) {
      e.preventDefault();
      const loader = document.getElementById('loader');
      const btn = document.getElementById('btnSubmit');
      
      loader.style.display = 'flex';
      btn.disabled = true;

      try {
        const fotoFile = document.getElementById('fotoInput').files[0];
        const sptFile = document.getElementById('sptInput').files[0];

        // Konversi file secara paralel
        const [fotoData, sptData] = await Promise.all([
          fileToBase64(fotoFile),
          fileToBase64(sptFile)
        ]);

        const payload = {
          nama: e.target.nama.value,
          instansi: e.target.instansi.value,
          keperluan: e.target.keperluan.value,
          tanggal: e.target.tanggal.value,
          foto: fotoData,
          spt: sptData
        };

        // Kirim menggunakan metode POST (Bypass CORS melalui mode no-cors)
        fetch(URL_APPS_SCRIPT, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(payload)
        })
        .then(() => {
          loader.style.display = 'none';
          btn.disabled = false;
          
          document.getElementById('output').innerHTML = `<div class="alert alert-success text-center border-0 shadow-sm fw-bold">Tarimo Kasih! Data kehadiran alah disimpan ka sistem cloud.</div>`;
          document.getElementById('guestForm').reset();
          
          // Set ulang tanggal otomatis hari ini
          const today = new Date().toISOString().split('T')[0];
          document.getElementById('tanggalInput').value = today;

          document.querySelectorAll('.preview-img').forEach(el => el.style.display = 'none');
          document.querySelectorAll('.preview-doc-box').forEach(el => el.style.display = 'none');
        })
        .catch(err => {
          loader.style.display = 'none';
          document.getElementById('output').innerHTML = `<div class="alert alert-danger font-monospace small">Gagal Koneksi API: ${err}</div>`;
          btn.disabled = false;
        });

      } catch (err) {
        loader.style.display = 'none';
        alert("Gagal memproses lampiran berkas.");
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
